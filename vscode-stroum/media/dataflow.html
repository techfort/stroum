<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'nonce-{{nonce}}'; style-src 'unsafe-inline';">
  <title>Stroum Dataflow</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--vscode-editor-background, #1e1e1e);
      color: var(--vscode-editor-foreground, #d4d4d4);
      font-family: var(--vscode-font-family, monospace);
      font-size: var(--vscode-font-size, 13px);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-bottom: 1px solid var(--vscode-panel-border, #303030);
      flex-shrink: 0;
    }

    header h2 {
      font-size: 13px;
      font-weight: 600;
      color: var(--vscode-titleBar-activeForeground, #ccc);
      margin-right: auto;
    }

    button {
      background: var(--vscode-button-background, #0e639c);
      color: var(--vscode-button-foreground, #fff);
      border: none;
      border-radius: 2px;
      padding: 3px 10px;
      font-size: 12px;
      cursor: pointer;
    }

    button:hover:not(:disabled) {
      background: var(--vscode-button-hoverBackground, #1177bb);
    }

    button:disabled {
      opacity: 0.45;
      cursor: default;
    }

    #stop-btn {
      background: var(--vscode-statusBarItem-errorBackground, #a1260d);
    }

    #stop-btn:hover:not(:disabled) {
      background: #c0392b;
    }

    #status {
      font-size: 11px;
      min-width: 80px;
    }

    .status-running { color: #27ae60; }
    .status-error   { color: #e74c3c; }
    .status-stopped { color: transparent; }

    #graph {
      flex: 1 1 60%;
      min-height: 0;
      border-bottom: 1px solid var(--vscode-panel-border, #303030);
    }

    #event-log {
      flex: 0 0 38%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #event-log h3 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 4px 10px;
      color: var(--vscode-descriptionForeground, #888);
      border-bottom: 1px solid var(--vscode-panel-border, #303030);
      flex-shrink: 0;
    }

    #log-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
    }

    #log-list li {
      display: flex;
      gap: 10px;
      align-items: baseline;
      padding: 2px 10px;
      border-bottom: 1px solid var(--vscode-panel-border, #2a2a2a);
      font-family: monospace;
      font-size: 11.5px;
      animation: fadeIn 0.2s ease;
    }

    #log-list li:nth-child(even) {
      background: rgba(255,255,255,0.02);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ts          { color: var(--vscode-descriptionForeground, #666); flex-shrink: 0; }
    .stream-name { color: #e67e22; font-weight: 600; flex-shrink: 0; }
    .value       { color: #7ec8e3; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .fn          { color: #888; font-style: italic; flex-shrink: 0; }

    #empty-hint {
      padding: 20px;
      text-align: center;
      color: var(--vscode-descriptionForeground, #666);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <header>
    <h2>Stroum Dataflow</h2>
    <button id="run-btn" title="Run the current .stm program">&#9654; Run</button>
    <button id="stop-btn" disabled title="Stop the running program">&#9632; Stop</button>
    <span id="status"></span>
  </header>

  <div id="graph">
    <div id="empty-hint">Open a .stm file and run "Stroum: Show Dataflow Graph"</div>
  </div>

  <section id="event-log">
    <h3>Stream Events</h3>
    <ul id="log-list"></ul>
  </section>

  <!-- Vendor scripts — loaded before the compiled webview bundle -->
  <script nonce="{{nonce}}" src="{{vendor/dagre.min.js}}"></script>
  <script nonce="{{nonce}}" src="{{vendor/cytoscape.min.js}}"></script>
  <script nonce="{{nonce}}" src="{{vendor/cytoscape-dagre.min.js}}"></script>

  <!-- Compiled webview bundle -->
  <script nonce="{{nonce}}" src="{{dataflow.js}}"></script>
</body>
</html>
